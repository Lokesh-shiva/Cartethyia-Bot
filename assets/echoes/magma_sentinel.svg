<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D0E17" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="200" height="200" rx="12" fill="#0D0E17"/>
  <rect width="200" height="200" rx="12" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="2" y="2" width="196" height="196" rx="11" fill="none"
        stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Corner ticks -->
  <line x1="2" y1="18" x2="2" y2="2"   stroke="#FF6B35" stroke-width="2"/>
  <line x1="2" y1="2"  x2="18" y2="2"  stroke="#FF6B35" stroke-width="2"/>
  <line x1="182" y1="2"  x2="198" y2="2"  stroke="#FF6B35" stroke-width="2"/>
  <line x1="198" y1="2"  x2="198" y2="18" stroke="#FF6B35" stroke-width="2"/>
  <line x1="2"   y1="182" x2="2"   y2="198" stroke="#FF6B35" stroke-width="2"/>
  <line x1="2"   y1="198" x2="18"  y2="198" stroke="#FF6B35" stroke-width="2"/>
  <line x1="182" y1="198" x2="198" y2="198" stroke="#FF6B35" stroke-width="2"/>
  <line x1="198" y1="182" x2="198" y2="198" stroke="#FF6B35" stroke-width="2"/>

  <!-- Silhouette placeholder circle -->
  <circle cx="100" cy="88" r="44" fill="#FF6B35" fill-opacity="0.12"
          stroke="#FF6B35" stroke-width="1" stroke-opacity="0.4" filter="url(#glow)"/>
  <text x="100" y="96" text-anchor="middle" font-size="38"
        fill="#FF6B35" fill-opacity="0.7" font-family="sans-serif">?</text>

  <!-- Cost dots -->
  <text x="100" y="150" text-anchor="middle" font-size="13"
        fill="#FF6B35" fill-opacity="0.9" font-family="monospace"
        letter-spacing="4">◈◈◈</text>

  <!-- Name -->
  <text x="100" y="172" text-anchor="middle" font-size="10"
        fill="#CCCCDD" font-family="sans-serif" font-weight="600"
        letter-spacing="1">MAGMA SENTINEL</text>

  <!-- Cost label -->
  <text x="100" y="188" text-anchor="middle" font-size="9"
        fill="#FF6B35" fill-opacity="0.7" font-family="monospace">3-COST ECHO</text>
</svg>